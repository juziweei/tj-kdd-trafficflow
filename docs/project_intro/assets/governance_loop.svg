<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Governance and Reproducibility Loop</title>
  <desc id="desc">Mandatory loop for each experiment session.</desc>
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', 'PingFang SC', sans-serif; fill: #1b3e5b; }
      .step { fill: #f4f9ff; stroke: #2b6ea6; stroke-width: 2; }
      .head { font: 700 17px 'Segoe UI', 'PingFang SC', sans-serif; fill: #224a6b; }
      .txt { font: 400 13px 'Segoe UI', 'PingFang SC', sans-serif; fill: #3d5f79; }
      .arrow { stroke: #2b6ea6; stroke-width: 2.5; marker-end: url(#arr); }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b6ea6"/>
    </marker>
  </defs>

  <text x="40" y="48" class="title">Experiment Governance Loop (Mandatory)</text>

  <rect x="52" y="110" width="210" height="170" rx="16" class="step"/>
  <text x="72" y="146" class="head">1) Plan Session</text>
  <text x="72" y="174" class="txt">Update vibe protocol</text>
  <text x="72" y="196" class="txt">Define metric target</text>
  <text x="72" y="218" class="txt">Assign run_id</text>

  <rect x="300" y="110" width="210" height="170" rx="16" class="step"/>
  <text x="320" y="146" class="head">2) Run Experiment</text>
  <text x="320" y="174" class="txt">Time-based validation</text>
  <text x="320" y="196" class="txt">Mainline command only</text>
  <text x="320" y="218" class="txt">Record outputs</text>

  <rect x="548" y="110" width="210" height="170" rx="16" class="step"/>
  <text x="568" y="146" class="head">3) Guardrail Check</text>
  <text x="568" y="174" class="txt">Leakage guardrails</text>
  <text x="568" y="196" class="txt">Schema validation</text>
  <text x="568" y="218" class="txt">Risk review</text>

  <rect x="796" y="110" width="210" height="170" rx="16" class="step"/>
  <text x="816" y="146" class="head">4) Log & Decide</text>
  <text x="816" y="174" class="txt">Update same session</text>
  <text x="816" y="196" class="txt">Keep/rollback decision</text>
  <text x="816" y="218" class="txt">Define next step</text>

  <line x1="262" y1="196" x2="300" y2="196" class="arrow"/>
  <line x1="510" y1="196" x2="548" y2="196" class="arrow"/>
  <line x1="758" y1="196" x2="796" y2="196" class="arrow"/>
  <path d="M1006 196 C1080 196, 1080 304, 650 304 C340 304, 180 304, 160 286" fill="none" class="arrow"/>

  <text x="1028" y="194" class="txt">repeat</text>
</svg>
